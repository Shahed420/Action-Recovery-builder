name: TWRP Build for Unisoc

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device codename (e.g., X6725B)'
        required: true
        default: 'X6725B'
      branch:
        description: 'TWRP branch'
        required: true
        default: 'twrp-12.1'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ========== SSH Agent Setup ==========
    - name: Setup SSH Agent
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add GitHub to known_hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan github.com >> ~/.ssh/known_hosts
        
    # ========== Environment Setup ==========
    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential zip curl libstdc++6 git wget python3 repo
        
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
    - name: Sync TWRP Minimal Manifest
      run: |
        # ডিরেক্টরি তৈরি
        mkdir -p ~/twrp
        cd ~/twrp
        
        # SSH URL ব্যবহার করা (HTTPS না)
        echo "📥 Initializing TWRP manifest with SSH..."
        repo init --depth=1 -u git@github.com:minimal-twrp/manifest.git -b ${{ github.event.inputs.branch }}
        
        # সিঙ্ক করা
        echo "🔄 Syncing repositories..."
        repo sync -c -j$(nproc) --force-sync --no-tags --no-clone-bundle --optimized-fetch
        
    - name: Copy Device Tree
      run: |
        cp -r ${{ github.workspace }}/device/* ~/twrp/device/
        
    - name: Build vendor_boot
      run: |
        cd ~/twrp
        source build/envsetup.sh
        lunch twrp_${{ github.event.inputs.device }}-eng
        export ALLOW_MISSING_DEPENDENCIES=true
        mka vendorbootimage
        
    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-${{ github.event.inputs.device }}
        path: ~/twrp/out/target/product/${{ github.event.inputs.device }}/vendor_boot.img
