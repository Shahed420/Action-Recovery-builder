name: TWRP Build for Unisoc

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device codename (e.g., X6725B)'
        required: true
        default: 'X6725B'
      branch:
        description: 'TWRP branch'
        required: true
        default: 'twrp-12.1'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
        
    # ========== Environment Setup ==========
    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential zip curl libstdc++6 git wget python3 python3-pip
        
    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH
        sudo ln -sf ~/bin/repo /usr/bin/repo || true
        
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
    # ========== Direct Git Clone Method (No Token) ==========
    - name: Clone Manifest Directly
      run: |
        # ডিরেক্টরি তৈরি
        mkdir -p ~/twrp
        cd ~/twrp
        
        # Manifest directly clone (repo init না করে)
        echo "📥 Cloning manifest directly..."
        git clone --depth 1 https://github.com/minimal-twrp/manifest.git .repo/manifests
        
        # Manifest সেট করা
        cd .repo/manifests
        git checkout ${{ github.event.inputs.branch }} || git checkout twrp-12.1
        
        # Default.xml তৈরি করা
        cd ../..
        ln -sf .repo/manifests/default.xml .repo/manifest.xml
        
    - name: Create Local Manifest
      run: |
        mkdir -p ~/twrp/.repo/local_manifests
        
        # লোকাল ম্যানিফেস্ট তৈরি (যদি প্রয়োজন হয়)
        cat > ~/twrp/.repo/local_manifests/device.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<manifest>
    <!-- আপনার device tree এখানে যোগ করুন -->
    <project path="device/infinix/X6725B" name="https://github.com/Shahed420/Infinix_X6725B_TWRP_Tree.git" remote="github" revision="main" />
</manifest>
EOF
        
    - name: Download Repo Source
      run: |
        cd ~/twrp
        
        echo "🔄 Downloading TWRP source..."
        
        # manifest থেকে projects লিস্ট বের করা
        if [ -f ".repo/manifest.xml" ]; then
          # Python script দিয়ে projects পার্স করা
          python3 -c "
import xml.etree.ElementTree as ET
import os
import subprocess

try:
    tree = ET.parse('.repo/manifest.xml')
    root = tree.getroot()
    
    for project in root.findall('project'):
        name = project.get('name')
        path = project.get('path')
        remote = project.get('remote', 'github')
        
        if name and path:
            print(f'Cloning {name} to {path}')
            os.makedirs(path, exist_ok=True)
            
            # Git clone
            url = f'https://github.com/{name}'
            cmd = f'git clone --depth 1 {url} {path}'
            subprocess.run(cmd, shell=True)
except Exception as e:
    print(f'Error: {e}')
"
        else:
          echo "Manifest file not found!"
        
    - name: Download Additional Repositories
      run: |
        cd ~/twrp
        
        # গুরুত্বপূর্ণ TWRP রিপোজিটরি গুলো ডাউনলোড
        mkdir -p bootable/recovery
        mkdir -p system/core
        mkdir -p external/f2fs-tools
        mkdir -p external/e2fsprogs
        
        echo "📥 Downloading TWRP recovery..."
        git clone --depth 1 https://github.com/minimal-twrp/platform_bootable_recovery.git bootable/recovery || true
        
        echo "📥 Downloading system core..."
        git clone --depth 1 https://github.com/minimal-twrp/platform_system_core.git system/core || true
        
        echo "📥 Downloading build system..."
        git clone --depth 1 https://github.com/minimal-twrp/platform_build.git build || true
        
    - name: Copy Device Tree
      run: |
        mkdir -p ~/twrp/device/unisoc/${{ github.event.inputs.device }}
        
        if [ -d "${{ github.workspace }}/device" ]; then
          cp -r ${{ github.workspace }}/device/* ~/twrp/device/unisoc/${{ github.event.inputs.device }}/
          echo "✅ Device tree copied"
        else
          echo "⚠️ No device tree found in repository"
          mkdir -p ~/twrp/device/unisoc/${{ github.event.inputs.device }}/recovery
        fi
        
    - name: Setup Build Environment
      run: |
        cd ~/twrp
        
        # বিল্ড এনভায়রনমেন্ট সেটআপ
        if [ -f "build/envsetup.sh" ]; then
          source build/envsetup.sh
        else
          echo "⚠️ envsetup.sh not found"
        fi
        
        # Lunch টার্গেট সেট
        export TARGET_DEVICE=${{ github.event.inputs.device }}
        export ALLOW_MISSING_DEPENDENCIES=true
        
        # বোর্ড কনফিগারেশন
        cat > device/unisoc/${{ github.event.inputs.device }}/BoardConfig.mk << 'EOF'
# Board Config
TARGET_NO_KERNEL := false
TARGET_NO_RECOVERY := false
BOARD_USES_RECOVERY_AS_BOOT :=
BOARD_USES_VENDOR_BOOT := true
BOARD_BOOT_HEADER_VERSION := 3
BOARD_KERNEL_PAGESIZE := 2048
BOARD_RAMDISK_OFFSET := 0x01000000
BOARD_TAGS_OFFSET := 0x00000100
BOARD_VENDOR_BOOTIMAGE_PARTITION_SIZE := 67108864
TW_THEME := portrait_hdpi
EOF
        
    - name: Build vendor_boot
      run: |
        cd ~/twrp
        
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        
        # বিল্ড কমান্ড
        if [ -f "build/envsetup.sh" ]; then
          source build/envsetup.sh
          
          echo "🏗️ Building vendor_boot..."
          mka vendorbootimage -j$(nproc) 2>&1 | tee build.log
        else
          echo "❌ Build system not found"
          exit 1
        fi
        
    - name: List Output Files
      if: always()
      run: |
        cd ~/twrp
        echo "📂 Output files:"
        find out/target/product -name "*.img" 2>/dev/null || echo "No IMG files found"
        
    - name: Upload Result
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-${{ github.event.inputs.device }}-${{ github.run_number }}
        path: |
          ~/twrp/out/target/product/*/vendor_boot.img
          ~/twrp/out/target/product/*/recovery.img
          ~/twrp/*.log
        if-no-files-found: warn
        retention-days: 15
