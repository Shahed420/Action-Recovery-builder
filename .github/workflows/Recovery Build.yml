name: TWRP Build for Unisoc

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device codename (e.g., X6725B)'
        required: true
        default: 'X6725B'
      branch:
        description: 'TWRP branch'
        required: true
        default: 'twrp-12.1'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
        
    # ========== Environment Setup ==========
    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential zip curl libstdc++6 git wget python3 python3-pip
        
    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH
        sudo ln -sf ~/bin/repo /usr/bin/repo || true
        
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

    # ========== Direct Git Clone Method (No Token) ==========
    - name: Clone Manifest Directly
      run: |
        # কাজের ডিরেক্টরি তৈরি
        mkdir -p ~/twrp
        cd ~/twrp
        
        # Manifest directly clone
        echo "📥 Cloning manifest directly..."
        mkdir -p .repo
        git clone --depth 1 https://github.com/minimal-twrp/manifest.git .repo/manifests
        
        # Manifest চেক করা
        cd .repo/manifests
        git checkout ${{ github.event.inputs.branch }} || git checkout twrp-12.1
        cd ../..
        
        # Manifest.xml লিঙ্ক করা
        ln -sf .repo/manifests/default.xml .repo/manifest.xml

    - name: Create Local Manifest
      run: |
        cd ~/twrp
        mkdir -p .repo/local_manifests
        
        # লোকাল ম্যানিফেস্ট তৈরি
        cat > .repo/local_manifests/device.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<manifest>
https://github.com/Shahed420/Infinix_X6725B_TWRP_Tree.git
    <!-- উদাহরণ: -->
    <!-- <project path="device/unisoc/X6725B" name="your-username/device_tree" remote="github" revision="main" /> -->
</manifest>
EOF
        
        echo "✅ Local manifest created"

    - name: Download Repo Source
      run: |
        cd ~/twrp
        
        echo "🔄 Downloading TWRP source..."
        
        # Manifest ফাইল চেক করা
        if [ -f ".repo/manifest.xml" ]; then
          echo "📋 Manifest found, parsing projects..."
          
          # Python script দিয়ে projects পার্স করা
          python3 -c "
import xml.etree.ElementTree as ET
import os
import subprocess
import sys

try:
    # Manifest ফাইল পার্স করা
    tree = ET.parse('.repo/manifest.xml')
    root = tree.getroot()
    
    # প্রতিটি project এর জন্য
    projects = root.findall('project')
    print(f'Found {len(projects)} projects to clone')
    
    for project in projects:
        name = project.get('name')
        path = project.get('path')
        remote = project.get('remote', 'github')
        
        if name and path:
            print(f'Cloning {name} to {path}')
            os.makedirs(path, exist_ok=True)
            
            # Git clone
            url = f'https://github.com/{name}'
            cmd = f'git clone --depth 1 {url} {path}'
            result = subprocess.run(cmd, shell=True, capture_output=True, text=True)
            
            if result.returncode == 0:
                print(f'  ✅ {name} cloned successfully')
            else:
                print(f'  ❌ Failed to clone {name}')
                
except Exception as e:
    print(f'Error: {e}')
    sys.exit(1)
"
        else:
          echo "❌ Manifest file not found!"
          exit 1
          
    - name: Download Additional Repositories
      run: |
        cd ~/twrp
        
        echo "📥 Downloading essential repositories..."
        
        # গুরুত্বপূর্ণ TWRP রিপোজিটরি
        mkdir -p bootable/recovery
        mkdir -p system/core
        mkdir -p external/f2fs-tools
        mkdir -p external/e2fsprogs
        mkdir -p build
        
        # Recovery
        echo "Downloading TWRP recovery..."
        git clone --depth 1 https://github.com/minimal-twrp/platform_bootable_recovery.git bootable/recovery || echo "⚠️ Recovery clone failed"
        
        # System core
        echo "Downloading system core..."
        git clone --depth 1 https://github.com/minimal-twrp/platform_system_core.git system/core || echo "⚠️ System core clone failed"
        
        # Build system
        echo "Downloading build system..."
        git clone --depth 1 https://github.com/minimal-twrp/platform_build.git build || echo "⚠️ Build system clone failed"
        
        echo "✅ Additional repositories downloaded"
        
    - name: Copy Device Tree
      run: |
        cd ~/twrp
        DEVICE="${{ github.event.inputs.device }}"
        
        # Device tree ডিরেক্টরি তৈরি
        mkdir -p device/unisoc/${DEVICE}
        
        # রিপোজিটরি থেকে device tree কপি
        if [ -d "${{ github.workspace }}/device" ]; then
          cp -r ${{ github.workspace }}/device/* device/unisoc/${DEVICE}/
          echo "✅ Device tree copied from repository"
        else
          echo "⚠️ No device tree found in repository"
          # স্যাম্পল device tree তৈরি
          mkdir -p device/unisoc/${DEVICE}/recovery
          
          # বেসিক BoardConfig.mk
          cat > device/unisoc/${DEVICE}/BoardConfig.mk << 'EOF2'
# Board Config
TARGET_NO_KERNEL := false
TARGET_NO_RECOVERY := false
BOARD_USES_RECOVERY_AS_BOOT :=
BOARD_USES_VENDOR_BOOT := true
BOARD_BOOT_HEADER_VERSION := 3
BOARD_KERNEL_PAGESIZE := 2048
BOARD_RAMDISK_OFFSET := 0x01000000
BOARD_TAGS_OFFSET := 0x00000100
BOARD_VENDOR_BOOTIMAGE_PARTITION_SIZE := 67108864
TW_THEME := portrait_hdpi
EOF2
        fi
        
        # Device tree structure দেখানো
        echo "📁 Device tree structure:"
        ls -la device/unisoc/${DEVICE}/
        
    - name: Setup Build Environment
      run: |
        cd ~/twrp
        
        # বিল্ড এনভায়রনমেন্ট সেটআপ
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        export TARGET_DEVICE=${{ github.event.inputs.device }}
        
        echo "✅ Build environment configured"
        
    - name: Build vendor_boot
      run: |
        cd ~/twrp
        
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        
        # বিল্ড সিস্টেম চেক
        if [ -f "build/envsetup.sh" ]; then
          source build/envsetup.sh
          
          # Lunch target
          echo "🏗️ Running lunch command..."
          lunch twrp_${{ github.event.inputs.device }}-eng || lunch twrp_${{ github.event.inputs.device }}-userdebug || echo "⚠️ Lunch failed"
          
          # বিল্ড
          echo "🔨 Building vendor_boot image..."
          mka vendorbootimage -j$(nproc) 2>&1 | tee build.log
          
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "✅ Build successful!"
          else
            echo "❌ Build failed"
          fi
        else
          echo "❌ Build system not found in ~/twrp/build/"
          echo "Contents of ~/twrp:"
          ls -la ~/twrp/
          exit 1
        fi
        
    - name: List Output Files
      if: always()
      run: |
        cd ~/twrp
        DEVICE="${{ github.event.inputs.device }}"
        
        echo "📂 Output files:"
        find out/target/product -name "*.img" 2>/dev/null || echo "No IMG files found"
        find . -name "*.log" -type f 2>/dev/null || echo "No log files found"
        
    - name: Upload Result
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-${{ github.event.inputs.device }}-${{ github.run_number }}
        path: |
          ~/twrp/out/target/product/*/vendor_boot.img
          ~/twrp/out/target/product/*/recovery.img
          ~/twrp/*.log
          ~/twrp/out/build.log
        if-no-files-found: warn
        retention-days: 15        # বিল্ড এনভায়রনমেন্ট সেটআপ
        if [ -f "build/envsetup.sh" ]; then
          source build/envsetup.sh
        else
          echo "⚠️ envsetup.sh not found"
        fi
        
        # Lunch টার্গেট সেট
        export TARGET_DEVICE=${{ github.event.inputs.device }}
        export ALLOW_MISSING_DEPENDENCIES=true
        
        # বোর্ড কনফিগারেশন
        cat > device/unisoc/${{ github.event.inputs.device }}/BoardConfig.mk << 'EOF'
# Board Config
TARGET_NO_KERNEL := false
TARGET_NO_RECOVERY := false
BOARD_USES_RECOVERY_AS_BOOT :=
BOARD_USES_VENDOR_BOOT := true
BOARD_BOOT_HEADER_VERSION := 3
BOARD_KERNEL_PAGESIZE := 2048
BOARD_RAMDISK_OFFSET := 0x01000000
BOARD_TAGS_OFFSET := 0x00000100
BOARD_VENDOR_BOOTIMAGE_PARTITION_SIZE := 67108864
TW_THEME := portrait_hdpi
EOF
        
    - name: Build vendor_boot
      run: |
        cd ~/twrp
        
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        
        # বিল্ড কমান্ড
        if [ -f "build/envsetup.sh" ]; then
          source build/envsetup.sh
          
          echo "🏗️ Building vendor_boot..."
          mka vendorbootimage -j$(nproc) 2>&1 | tee build.log
        else
          echo "❌ Build system not found"
          exit 1
        fi
        
    - name: List Output Files
      if: always()
      run: |
        cd ~/twrp
        echo "📂 Output files:"
        find out/target/product -name "*.img" 2>/dev/null || echo "No IMG files found"
        
    - name: Upload Result
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-${{ github.event.inputs.device }}-${{ github.run_number }}
        path: |
          ~/twrp/out/target/product/*/vendor_boot.img
          ~/twrp/out/target/product/*/recovery.img
          ~/twrp/*.log
        if-no-files-found: warn
        retention-days: 15
