name: TWRP Build for Unisoc

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device codename (e.g., X6725B)'
        required: true
        default: 'X6725B'
      branch:
        description: 'TWRP branch'
        required: true
        default: 'twrp-12.1'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
        
    # ========== Environment Setup ==========
    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential zip curl libstdc++6 git wget python3
        
    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH
        
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
    # ========== HTTPS with Token ==========
    - name: Sync TWRP Minimal Manifest
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        # Check if token exists
        if [ -z "$GH_TOKEN" ]; then
          echo "❌ Error: GH_TOKEN secret is not set!"
          echo "Please add your GitHub token to repository secrets as GH_TOKEN"
          exit 1
        fi
        
        # ডিরেক্টরি তৈরি
        mkdir -p ~/twrp
        cd ~/twrp
        
        # Token সহ HTTPS URL
        echo "📥 Initializing TWRP manifest..."
        repo init --depth=1 \
          -u https://${{ secrets.GH_TOKEN }}@github.com/minimal-twrp/manifest.git \
          -b ${{ github.event.inputs.branch }}
        
        # সিঙ্ক করা
        echo "🔄 Syncing repositories..."
        repo sync -c -j$(nproc) --force-sync --no-tags --no-clone-bundle --optimized-fetch
        
    - name: Copy Device Tree
      run: |
        mkdir -p ~/twrp/device/unisoc/${{ github.event.inputs.device }}
        cp -r ${{ github.workspace }}/device/* ~/twrp/device/unisoc/${{ github.event.inputs.device }}/
        
    - name: Build vendor_boot
      run: |
        cd ~/twrp
        source build/envsetup.sh
        lunch twrp_${{ github.event.inputs.device }}-eng
        export ALLOW_MISSING_DEPENDENCIES=true
        mka vendorbootimage
        
    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-${{ github.event.inputs.device }}
        path: ~/twrp/out/target/product/${{ github.event.inputs.device }}/vendor_boot.img
